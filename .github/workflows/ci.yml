# CI ligero — sin secretos ni despliegue
# Verifica sintaxis Python en api/ y build de Next.js en web/

name: CI

on:
  push:
    branches: [master, develop, main]
  pull_request:
    branches: [master, develop, main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api-check:
    name: API — sintaxis Python
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements.txt

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Comprobar sintaxis (compileall)
        run: python -m compileall -q .

      - name: Comprobar imports principales
        run: |
          python -c "from analyzer import analyze_text"
          python -c "from gdelt_fetcher import search_animal_health"
          python -c "import main"

  web-build:
    name: Web — build Next.js
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Instalar dependencias
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Build estático sin backend en CI
          NEXT_PUBLIC_API_URL: http://localhost:8000
